<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRIOFIT Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d0c0f;
    color: #eee;
    margin: 0;
    padding: 32px;
    background-image: radial-gradient(circle at 20% 0%, rgba(199,155,69,0.04), transparent 40%);
  }
  h1 { font-family: Georgia, serif; font-size: 22px; color: #E9C275; margin: 0 0 4px; letter-spacing: 0.01em; }
  .greeting { font-size: 13px; color: #888; margin-bottom: 24px; }

  .kpi-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 28px; }
  .kpi-card {
    background: linear-gradient(145deg, #1a191d, #151417);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 18px 22px;
    min-width: 140px;
    flex: 1;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .kpi-card .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .kpi-card .value { font-size: 28px; font-weight: 700; color: #E9C275; font-family: Georgia, serif; }

  .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .tabs button {
    background: transparent; border: 1px solid rgba(255,255,255,0.08); color: #999;
    padding: 9px 18px; border-radius: 20px; font-size: 13px; cursor: pointer;
  }
  .tabs button.active { background: #C79B45; color: #0a0a0a; border: none; font-weight: 600; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
  .search-box {
    flex: 1; min-width: 200px; padding: 10px 16px; background: #1a191d;
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #eee; font-size: 13px;
  }
  .filter-chip {
    padding: 7px 14px; border-radius: 16px; font-size: 12px; cursor: pointer;
    background: #1a191d; border: 1px solid rgba(255,255,255,0.08); color: #999;
  }
  .filter-chip.active { background: rgba(199,155,69,0.15); border-color: #C79B45; color: #C79B45; }

  .queue-item {
    background: linear-gradient(145deg, #1a191d, #151417);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px; padding: 20px; margin-bottom: 16px;
  }
  .queue-item .top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .queue-item .name { font-size: 16px; font-weight: 600; color: #fff; }
  .queue-item .meta { font-size: 12px; color: #888; margin-top: 3px; }

  .confidence-ring {
    display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 5px 12px;
    border-radius: 20px; font-weight: 600;
  }
  .confidence-ring.high { background: rgba(93,202,165,0.12); color: #5DCAA5; }
  .confidence-ring.mid { background: rgba(199,155,69,0.12); color: #C79B45; }
  .confidence-ring.low { background: rgba(216,90,48,0.12); color: #D85A30; }

  .suggestion {
    display: flex; gap: 14px; align-items: center; margin-top: 14px;
    background: #0f0e11; padding: 12px; border-radius: 14px;
  }
  .suggestion img { width: 68px; height: 68px; object-fit: cover; border-radius: 10px; }
  .suggestion-desc { font-size: 13px; flex: 1; color: #ddd; }

  .action-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  button.primary { background: #C79B45; border: none; color: #0a0a0a; font-weight: 700; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-size: 13px; }
  button.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #ccc; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-size: 13px; }

  .picker { display: none; margin-top: 14px; background: #0f0e11; border-radius: 12px; padding: 10px; max-height: 260px; overflow-y: auto; }
  .picker.open { display: block; }
  .picker-item { display: flex; gap: 10px; align-items: center; padding: 8px; border-radius: 8px; cursor: pointer; }
  .picker-item:hover { background: #1a191d; }
  .picker-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }

  .template-form {
    background: linear-gradient(145deg, #1a191d, #151417);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px; padding: 22px; max-width: 480px;
  }
  .template-form input, .template-form select {
    width: 100%; padding: 10px 14px; margin-bottom: 10px; background: #0f0e11;
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #eee; font-size: 13px;
  }
  .row { display: flex; gap: 10px; }

  .empty { color: #555; font-size: 13px; padding: 30px 0; text-align: center; }

  .breakdown {
    background: linear-gradient(145deg, #1a191d, #151417);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 18px; padding: 20px; margin-bottom: 16px;
  }
  .breakdown h3 { font-size: 12px; color: #999; margin: 0 0 14px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }

  .session-row {
    background: #0f0e11; border: 1px solid rgba(255,255,255,0.04); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px; font-size: 13px; cursor: pointer;
    transition: background 0.15s;
  }
  .session-row:hover { background: #16151a; }
  .session-row .meta { color: #888; font-size: 11px; margin-bottom: 6px; }
  .session-row .sit { color: #ddd; line-height: 1.6; font-style: italic; }
  .session-row .view-link { color: #C79B45; font-size: 11px; margin-top: 8px; display: inline-block; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #151417; border-radius: 20px; max-width: 560px; width: 100%;
    max-height: 85vh; display: flex; flex-direction: column; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { margin: 0; font-size: 15px; color: #fff; }
  .modal-close { background: transparent; border: none; color: #888; font-size: 20px; cursor: pointer; }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 13px; margin-bottom: 10px; line-height: 1.5; }
  .msg-bubble.user { background: rgba(199,155,69,0.1); border: 1px solid rgba(199,155,69,0.2); margin-left: auto; }
  .msg-bubble.admin { background: #0f0e11; border: 1px solid rgba(255,255,255,0.04); }
  .msg-bubble img { max-width: 100%; border-radius: 8px; margin-top: 6px; }
  .msg-time { font-size: 10px; color: #666; margin-top: 4px; }
</style>
</head>
<body>

<h1>TRIOFIT — Admin</h1>
<div class="greeting" id="greeting">Loading…</div>

<div class="kpi-row" id="kpiRow"></div>

<div class="tabs">
  <button id="tabQueue" class="active" onclick="showTab('queue')">Live Queue</button>
  <button id="tabTemplates" onclick="showTab('templates')">Templates</button>
  <button id="tabAnalytics" onclick="showTab('analytics')">Analytics</button>
</div>

<div id="queueView">
  <div class="toolbar">
    <input class="search-box" id="searchBox" placeholder="Search by name…" oninput="renderQueue()">
    <div class="filter-chip active" data-filter="all" onclick="setFilter('all')">All</div>
    <div class="filter-chip" data-filter="high" onclick="setFilter('high')">High confidence</div>
    <div class="filter-chip" data-filter="low" onclick="setFilter('low')">Needs review</div>
  </div>
  <div id="queueList" class="empty">Loading…</div>
</div>

<div id="templatesView" style="display:none;">
  <div class="template-form">
    <input id="t-desc" placeholder="Description">
    <div class="row">
      <select id="t-occasion">
        <option value="A professional interview">Interview</option>
        <option value="An evening out">Evening out</option>
        <option value="A wedding">Wedding</option>
        <option value="Everyday office wear">Office wear</option>
        <option value="A casual event">Casual event</option>
      </select>
      <select id="t-gender">
        <option value="">Any</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>
    <input id="t-style" placeholder="Style tag">
    <input id="t-image" placeholder="Image URL">
    <div class="row">
      <input id="t-conf" type="number" placeholder="Confidence" value="80">
      <input id="t-auth" type="number" placeholder="Authority" value="80">
    </div>
    <div class="row">
      <input id="t-trust" type="number" placeholder="Trust" value="80">
      <input id="t-appr" type="number" placeholder="Approachability" value="75">
    </div>
    <input id="t-fit" type="number" placeholder="Style fit" value="80">
    <button class="primary" onclick="addTemplate()">Save template</button>
  </div>
</div>

<div id="analyticsView" style="display:none;">
  <div class="breakdown">
    <h3>Conversion funnel</h3>
    <canvas id="funnelChart" height="90"></canvas>
  </div>
  <div class="breakdown">
    <h3>Usage by hour of day</h3>
    <canvas id="hourChart" height="90"></canvas>
  </div>
  <div class="row" style="gap: 16px; align-items: flex-start;">
    <div class="breakdown" style="flex: 1;">
      <h3>Goals</h3>
      <canvas id="goalChart" height="180"></canvas>
    </div>
    <div class="breakdown" style="flex: 1;">
      <h3>Occasions</h3>
      <canvas id="occasionChart" height="180"></canvas>
    </div>
  </div>
  <div class="breakdown">
    <h3>Styles</h3>
    <canvas id="styleChart" height="100"></canvas>
  </div>
  <div class="breakdown">
    <h3>Recent sessions — click to view full conversation</h3>
    <div id="sessionsList" class="empty">Loading…</div>
  </div>
</div>

<div class="modal-overlay" id="convoModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="convoModalTitle">Conversation</h3>
      <button class="modal-close" onclick="closeConvoModal()">Close</button>
    </div>
    <div class="modal-body" id="convoModalBody"></div>
  </div>
</div>

<script>
const API = "https://triofitai-production.up.railway.app/api";
let allTemplatesCache = [];
let queueCache = [];
let currentFilter = 'all';
let chartInstances = {};

const GOLD = '#C79B45';
const GOLD_LIGHT = '#D9AE5A';
const CHART_COLORS = ['#C79B45', '#D9AE5A', '#7F77DD', '#5DCAA5', '#D85A30', '#E9C275', '#8d6523'];

function showTab(tab) {
  document.getElementById('queueView').style.display = tab === 'queue' ? 'block' : 'none';
  document.getElementById('templatesView').style.display = tab === 'templates' ? 'block' : 'none';
  document.getElementById('analyticsView').style.display = tab === 'analytics' ? 'block' : 'none';
  document.getElementById('tabQueue').classList.toggle('active', tab === 'queue');
  document.getElementById('tabTemplates').classList.toggle('active', tab === 'templates');
  document.getElementById('tabAnalytics').classList.toggle('active', tab === 'analytics');
  if (tab === 'queue') loadQueue();
  if (tab === 'analytics') loadAnalytics();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(function(c) {
    c.classList.toggle('active', c.dataset.filter === f);
  });
  renderQueue();
}

function confidenceClass(c) {
  if (c >= 85) return 'high';
  if (c >= 65) return 'mid';
  return 'low';
}

function greetingTime() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning, Kevin.';
  if (h < 18) return 'Good afternoon, Kevin.';
  return 'Good evening, Kevin.';
}

function formatDuration(seconds) {
  if (seconds === null || seconds === undefined) return '—';
  if (seconds < 60) return seconds + 's';
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return mins + 'm ' + secs + 's';
}

async function loadKpis() {
  document.getElementById('greeting').textContent = greetingTime();
  let analyticsRes = null;
  let correctionsRes = null;
  try {
    analyticsRes = await fetch(API + '/analytics/overview').then(function(r) { return r.json(); });
  } catch (e) {}
  try {
    correctionsRes = await fetch(API + '/admin/corrections').then(function(r) { return r.json(); });
  } catch (e) {}

  if (!analyticsRes || !correctionsRes) return;

  const kpis = [
    { label: 'Sessions', value: analyticsRes.funnel.totalSessionsStarted },
    { label: 'Outfits sent', value: analyticsRes.funnel.outfitsSent },
    { label: 'AI accuracy', value: correctionsRes.stats.accuracy !== null ? correctionsRes.stats.accuracy + '%' : '—' },
    { label: 'Avg session time', value: formatDuration(analyticsRes.avgDurationSeconds) },
    { label: 'Needs review', value: analyticsRes.funnel.currentlyPending }
  ];

  document.getElementById('kpiRow').innerHTML = kpis.map(function(k) {
    return '<div class="kpi-card"><div class="label">' + k.label + '</div><div class="value">' + k.value + '</div></div>';
  }).join('');
}

async function loadQueue() {
  const res = await fetch(API + '/admin/pending');
  queueCache = await res.json();
  let allTemplates = [];
  try {
    allTemplates = await fetch(API + '/templates').then(function(r) { return r.json(); });
  } catch (e) {}
  allTemplatesCache = allTemplates || [];
  renderQueue();
}

function renderQueue() {
  const searchBox = document.getElementById('searchBox');
  const searchTerm = searchBox ? searchBox.value.toLowerCase() : '';

  const filtered = queueCache.filter(function(item) {
    const name = (item.sessions && item.sessions.name ? item.sessions.name : '').toLowerCase();
    if (searchTerm && name.indexOf(searchTerm) === -1) return false;
    if (currentFilter === 'high' && (item.ai_confidence || 0) < 85) return false;
    if (currentFilter === 'low' && (item.ai_confidence || 0) >= 65) return false;
    return true;
  });

  const list = document.getElementById('queueList');
  if (!filtered.length) {
    list.className = 'empty';
    list.innerHTML = 'No one waiting for review right now.';
    return;
  }

  list.className = '';
  list.innerHTML = filtered.map(function(item) {
    const sess = item.sessions || {};
    const tmpl = item.outfit_templates;
    let html = '<div class="queue-item">';
    html += '<div class="top-row"><div><div class="name">' + (sess.name || 'Unknown') + '</div>';
    html += '<div class="meta">' + (sess.occasion || '') + ' · goal: ' + (sess.goal || '') + ' · style: ' + (sess.style || '') + '</div></div>';
    html += '<div class="confidence-ring ' + confidenceClass(item.ai_confidence || 0) + '">' + (item.ai_confidence != null ? item.ai_confidence : '?') + '%</div></div>';

    if (tmpl) {
      html += '<div class="suggestion"><img src="' + tmpl.image_url + '" onerror="this.style.display=\'none\'">';
      html += '<div class="suggestion-desc">' + tmpl.description + '</div></div>';
      html += '<div class="action-row">';
      html += '<button class="primary" onclick="sendSuggested(\'' + item.session_id + '\')">Send suggested</button>';
      html += '<button class="secondary" onclick="togglePicker(\'' + item.session_id + '\')">Choose different</button>';
      html += '<button class="secondary" onclick="viewConversation(\'' + item.session_id + '\')">View chat</button>';
      html += '</div>';
      html += '<div class="picker" id="picker-' + item.session_id + '">';
      html += allTemplatesCache.map(function(t) {
        return '<div class="picker-item" onclick="sendOverride(\'' + item.session_id + '\', \'' + t.id + '\')">' +
          '<img src="' + t.image_url + '" onerror="this.style.display=\'none\'"><div>' + t.description + '</div></div>';
      }).join('');
      html += '</div>';
    } else {
      html += '<div class="empty">No suggestion matched — add a template.</div>';
    }

    html += '</div>';
    return html;
  }).join('');
}

function togglePicker(sessionId) {
  document.getElementById('picker-' + sessionId).classList.toggle('open');
}

async function sendSuggested(sessionId) {
  await fetch(API + '/templates/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId })
  });
  loadQueue();
  loadKpis();
}

async function sendOverride(sessionId, templateId) {
  await fetch(API + '/templates/override', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId, template_id: templateId })
  });
  loadQueue();
  loadKpis();
}

async function addTemplate() {
  const body = {
    description: document.getElementById('t-desc').value,
    occasion: document.getElementById('t-occasion').value,
    gender: document.getElementById('t-gender').value || null,
    style_tag: document.getElementById('t-style').value,
    image_url: document.getElementById('t-image').value,
    base_confidence: parseInt(document.getElementById('t-conf').value),
    base_authority: parseInt(document.getElementById('t-auth').value),
    base_trust: parseInt(document.getElementById('t-trust').value),
    base_approachability: parseInt(document.getElementById('t-appr').value),
    base_style_fit: parseInt(document.getElementById('t-fit').value)
  };
  await fetch(API + '/templates', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  alert('Template saved.');
  document.getElementById('t-desc').value = '';
  document.getElementById('t-image').value = '';
}

function destroyChart(id) {
  if (chartInstances[id]) {
    chartInstances[id].destroy();
    delete chartInstances[id];
  }
}

function renderBarChart(canvasId, counts) {
  destroyChart(canvasId);
  const entries = Object.entries(counts).sort(function(a, b) { return b[1] - a[1]; });
  const ctx = document.getElementById(canvasId).getContext('2d');
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: entries.map(function(e) { return e[0]; }),
      datasets: [{
        data: entries.map(function(e) { return e[1]; }),
        backgroundColor: GOLD,
        borderRadius: 6,
        maxBarThickness: 36
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#999', font: { size: 11 } }, grid: { display: false } },
        y: { ticks: { color: '#999', font: { size: 11 }, precision: 0 }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

function renderPieChart(canvasId, counts) {
  destroyChart(canvasId);
  const entries = Object.entries(counts).sort(function(a, b) { return b[1] - a[1]; });
  const ctx = document.getElementById(canvasId).getContext('2d');
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: entries.map(function(e) { return e[0]; }),
      datasets: [{
        data: entries.map(function(e) { return e[1]; }),
        backgroundColor: CHART_COLORS,
        borderColor: '#151417',
        borderWidth: 2
      }]
    },
    options: {
      plugins: {
        legend: { position: 'bottom', labels: { color: '#ccc', font: { size: 11 }, padding: 12 } }
      }
    }
  });
}

function renderFunnelChart(funnel) {
  destroyChart('funnelChart');
  const labels = ['Sessions started', 'Reached analysis', 'Outfits sent'];
  const values = [funnel.totalSessionsStarted, funnel.sessionsThatReachedAnalysis, funnel.outfitsSent];
  const ctx = document.getElementById('funnelChart').getContext('2d');
  chartInstances['funnelChart'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: [GOLD, GOLD_LIGHT, '#5DCAA5'],
        borderRadius: 6
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#999', font: { size: 11 }, precision: 0 }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#ccc', font: { size: 12 } }, grid: { display: false } }
      }
    }
  });
}

async function loadAnalytics() {
  const res = await fetch(API + '/analytics/overview');
  const data = await res.json();

  renderFunnelChart(data.funnel);
  renderBarChart('hourChart', data.hourCounts);
  renderPieChart('goalChart', data.goalCounts);
  renderPieChart('occasionChart', data.occasionCounts);
  renderBarChart('styleChart', data.styleCounts);

  const sessRes = await fetch(API + '/analytics/sessions');
  const sessions = await sessRes.json();
  const list = document.getElementById('sessionsList');

  if (!sessions.length) {
    list.className = 'empty';
    list.innerHTML = 'No sessions recorded yet.';
    return;
  }

  list.className = '';
 list.innerHTML = sessions.map(function(s) {
  const sitHtml = s.situation ? ('<div class="sit">"' + s.situation + '"</div>') : '<div class="sit">No situation text recorded.</div>';
  const proLabel = s.is_pro ? 'Pro ✓' : 'Make Pro';
  const proClass = s.is_pro ? 'primary' : 'secondary';
  return '<div class="session-row">' +
    '<div onclick="viewConversation(\'' + s.session_id + '\')">' +
    '<div class="meta">' + (s.name || 'Unknown') + ' · ' + (s.goal || '') + ' · ' + new Date(s.created_at).toLocaleString() + '</div>' +
    sitHtml +
    '<div class="view-link">View full conversation -></div></div>' +
    '<button class="' + proClass + '" style="margin-top:8px;" onclick="event.stopPropagation(); toggleProStatus(\'' + s.session_id + '\', ' + (!s.is_pro) + ')">' + proLabel + '</button>' +
    '</div>';
}).join('');

 async function toggleProStatus(sessionId, newStatus) {
  await fetch(API + '/session/' + sessionId + '/pro-status', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ is_pro: newStatus })
  });
  loadAnalytics();
}
 
async function viewConversation(sessionId) {
  const res = await fetch(API + '/analytics/session/' + sessionId + '/conversation');
  const data = await res.json();

  document.getElementById('convoModalTitle').textContent = (data.session && data.session.name) || 'Conversation';
  const body = document.getElementById('convoModalBody');

  if (!data.messages.length) {
    body.innerHTML = '<div class="empty">No messages recorded for this session.</div>';
  } else {
    body.innerHTML = data.messages.map(function(m) {
      const imgHtml = (m.message_type === 'image' && m.image_url) ? ('<img src="' + m.image_url + '">') : '';
      return '<div class="msg-bubble ' + (m.sender === 'user' ? 'user' : 'admin') + '">' +
        imgHtml +
        '<div>' + m.message + '</div>' +
        '<div class="msg-time">' + new Date(m.created_at).toLocaleTimeString() + '</div></div>';
    }).join('');
  }

  document.getElementById('convoModal').classList.add('open');
}

function closeConvoModal() {
  document.getElementById('convoModal').classList.remove('open');
}

document.getElementById('convoModal').addEventListener('click', function(e) {
  if (e.target.id === 'convoModal') closeConvoModal();
});

loadQueue();
loadKpis();
setInterval(function() {
  loadQueue();
  loadKpis();
}, 5000);
</script>
</body>
</html>
